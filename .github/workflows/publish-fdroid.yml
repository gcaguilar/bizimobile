name: Publish signed F-Droid APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build and publish, for example 0.22.9-fdroid'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-fdroid:
    name: Build and upload signed F-Droid APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag }}

      - name: Validate release tag
        run: |
          release_tag="${{ github.event.inputs.tag }}"
          if [[ -z "$release_tag" ]]; then
            echo "::error::tag input is required"
            exit 1
          fi
          if ! git rev-parse --verify "refs/tags/$release_tag" >/dev/null 2>&1; then
            echo "::error::Tag not found: $release_tag"
            exit 1
          fi
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"

      - name: Set up Java 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Install pinned Android build-tools
        run: sdkmanager "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0
        with:
          build-scan-terms-of-use-url: https://gradle.com/help/legal-terms-of-use
          build-scan-terms-of-use-agree: "yes"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Write signing assets
        env:
          BIZI_CI_KEYSTORE_BASE64: ${{ secrets.BIZI_CI_KEYSTORE_BASE64 }}
        run: |
          if [[ -z "$BIZI_CI_KEYSTORE_BASE64" ]]; then
            echo "::error::BIZI_CI_KEYSTORE_BASE64 secret is required"
            exit 1
          fi
          printf '%s' "$BIZI_CI_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/bizi-ci.keystore"

      - name: Build unsigned F-Droid APK
        run: |
          ./gradlew :androidApp:assembleFdroidRelease --no-build-cache

      - name: Sign F-Droid APK with pinned apksigner
        env:
          KEYSTORE_PASSWORD: ${{ secrets.BIZI_CI_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.BIZI_CI_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.BIZI_CI_KEY_PASSWORD }}
        run: |
          build_tools_dir="${ANDROID_SDK_ROOT}/build-tools/34.0.0"
          apksigner_path="${build_tools_dir}/apksigner"
          unsigned_apk="androidApp/build/outputs/apk/fdroid/release/androidApp-fdroid-release-unsigned.apk"
          signed_apk="androidApp/build/outputs/apk/fdroid/release/androidApp-fdroid-release.apk"

          if [[ ! -x "$apksigner_path" ]]; then
            echo "::error::Pinned apksigner not found at $apksigner_path"
            exit 1
          fi

          if [[ ! -f "$unsigned_apk" ]]; then
            echo "::error::Unsigned F-Droid APK not found at $unsigned_apk"
            ls -l androidApp/build/outputs/apk/fdroid/release || true
            exit 1
          fi

          "$apksigner_path" sign \
            --ks "$RUNNER_TEMP/bizi-ci.keystore" \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out "$signed_apk" \
            "$unsigned_apk"

          "$apksigner_path" verify --verbose "$signed_apk"

      - name: Prepare release assets
        run: |
          apk_path="androidApp/build/outputs/apk/fdroid/release/androidApp-fdroid-release.apk"
          if [[ -z "$apk_path" ]]; then
            echo "::error::No signed F-Droid APK found in androidApp/build/outputs/apk/fdroid/release"
            ls -l androidApp/build/outputs/apk/fdroid/release || true
            exit 1
          fi

          if [[ ! -f "$apk_path" ]]; then
            echo "::error::Expected signed F-Droid APK not found at $apk_path"
            ls -l androidApp/build/outputs/apk/fdroid/release || true
            exit 1
          fi

          release_dir="$RUNNER_TEMP/fdroid-release"
          mkdir -p "$release_dir"
          asset_name="BiciRadar-${RELEASE_TAG}.apk"
          cp "$apk_path" "$release_dir/$asset_name"
          sha256sum "$release_dir/$asset_name" > "$release_dir/$asset_name.sha256"

          {
            echo "RELEASE_DIR=$release_dir"
            echo "ASSET_NAME=$asset_name"
          } >> "$GITHUB_ENV"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "$RELEASE_DIR/$ASSET_NAME" \
            "$RELEASE_DIR/$ASSET_NAME.sha256" \
            --clobber
