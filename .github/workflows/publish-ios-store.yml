name: Publish iOS to App Store

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-ios-store
  cancel-in-progress: false

jobs:
  publish-ios-store:
    name: Publish signed iOS IPA to App Store
    runs-on: macos-26
    timeout-minutes: 60
    env:
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      APPLE_BUNDLE_ID: ${{ vars.APPLE_BUNDLE_ID }}
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
      APP_REVIEW_CONTACT_FIRST_NAME: ${{ secrets.APP_REVIEW_CONTACT_FIRST_NAME }}
      APP_REVIEW_CONTACT_LAST_NAME: ${{ secrets.APP_REVIEW_CONTACT_LAST_NAME }}
      APP_REVIEW_CONTACT_EMAIL: ${{ secrets.APP_REVIEW_CONTACT_EMAIL }}
      APP_REVIEW_CONTACT_PHONE: ${{ secrets.APP_REVIEW_CONTACT_PHONE }}
      APP_REVIEW_NOTES: ${{ secrets.APP_REVIEW_NOTES }}
      APP_USES_ENCRYPTION: ${{ vars.APP_USES_ENCRYPTION }}
      APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-tags: true

      - name: Resolve release version
        run: |
          release_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "RELEASE_TAG=${release_tag:-$(git rev-parse --short HEAD)}" >> "$GITHUB_ENV"
          echo "Building iOS release: ${release_tag:-$(git rev-parse --short HEAD)}"

      - name: Set up Java 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0
        with:
          build-scan-terms-of-use-url: https://gradle.com/help/legal-terms-of-use
          build-scan-terms-of-use-agree: "yes"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Write iOS secrets
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_IOS }}
        run: |
          printf 'GOOGLE_MAPS_IOS_API_KEY = %s\n' "$GOOGLE_MAPS_API_KEY" > apple/Config/LocalSecrets.xcconfig
          if [[ -n "$GOOGLE_SERVICE_INFO_PLIST" ]]; then
            printf '%s' "$GOOGLE_SERVICE_INFO_PLIST" > apple/iosApp/GoogleService-Info.plist
          fi

      - name: Decode signing assets
        env:
          APPLE_SIGNING_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_SIGNING_CERTIFICATE_P12_BASE64 }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          APPLE_WIDGET_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_WIDGET_PROVISIONING_PROFILE_BASE64 }}
          APPLE_WATCH_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_WATCH_PROVISIONING_PROFILE_BASE64 }}
          APPLE_WATCH_WIDGET_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_WATCH_WIDGET_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [[ -z "$APPLE_SIGNING_CERTIFICATE_P12_BASE64" ]]; then
            echo "::error::APPLE_SIGNING_CERTIFICATE_P12_BASE64 secret is empty or not available"
            exit 1
          fi
          if [[ -z "$APPLE_PROVISIONING_PROFILE_BASE64" ]]; then
            echo "::error::APPLE_PROVISIONING_PROFILE_BASE64 secret is empty or not available"
            exit 1
          fi
          if [[ -z "$APPLE_WIDGET_PROVISIONING_PROFILE_BASE64" ]]; then
            echo "::error::APPLE_WIDGET_PROVISIONING_PROFILE_BASE64 secret is empty or not available"
            exit 1
          fi
          if [[ -z "$APPLE_WATCH_WIDGET_PROVISIONING_PROFILE_BASE64" ]]; then
            echo "::error::APPLE_WATCH_WIDGET_PROVISIONING_PROFILE_BASE64 secret is empty or not available"
            exit 1
          fi

          printf '%s' "$APPLE_SIGNING_CERTIFICATE_P12_BASE64" | base64 -D > "$RUNNER_TEMP/signing-certificate.p12"
          printf '%s' "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 -D > "$RUNNER_TEMP/signing-profile.mobileprovision"
          printf '%s' "$APPLE_WIDGET_PROVISIONING_PROFILE_BASE64" | base64 -D > "$RUNNER_TEMP/widget-signing-profile.mobileprovision"

          echo "APPLE_CERTIFICATE_PATH=$RUNNER_TEMP/signing-certificate.p12" >> "$GITHUB_ENV"
          echo "APPLE_PROFILE_PATH=$RUNNER_TEMP/signing-profile.mobileprovision" >> "$GITHUB_ENV"
          echo "APPLE_WIDGET_PROFILE_PATH=$RUNNER_TEMP/widget-signing-profile.mobileprovision" >> "$GITHUB_ENV"

          extract_profile_name() {
            local profile_path="$1"
            local profile_name=""
            if security cms -D -i "$profile_path" >/dev/null 2>&1; then
              profile_name=$(/usr/libexec/PlistBuddy -c 'Print Name' /dev/stdin <<< "$(security cms -D -i "$profile_path" 2>/dev/null)" 2>/dev/null || true)
            fi
            if [[ -z "$profile_name" ]]; then
              profile_name=$(grep -a -A1 '<key>Name</key>' "$profile_path" 2>/dev/null | grep '<string>' | sed 's/.*<string>\(.*\)<\/string>.*/\1/' || true)
            fi
            echo "$profile_name" | tr -d '\r\n' | xargs
          }

          profile_name=$(extract_profile_name "$RUNNER_TEMP/signing-profile.mobileprovision")
          if [[ -n "$profile_name" ]]; then
            echo "APPLE_PROFILE_NAME=$profile_name" >> "$GITHUB_ENV"
            echo "iOS profile name: $profile_name"
          else
            echo "Warning: Could not extract iOS profile name"
          fi

          widget_profile_name=$(extract_profile_name "$RUNNER_TEMP/widget-signing-profile.mobileprovision")
          if [[ -n "$widget_profile_name" ]]; then
            echo "APPLE_WIDGET_PROFILE_NAME=$widget_profile_name" >> "$GITHUB_ENV"
            echo "iOS widget profile name: $widget_profile_name"
          else
            echo "::error::Could not extract iOS widget profile name"
            exit 1
          fi

          if [[ -n "$APPLE_WATCH_PROVISIONING_PROFILE_BASE64" ]]; then
            printf '%s' "$APPLE_WATCH_PROVISIONING_PROFILE_BASE64" | base64 -D > "$RUNNER_TEMP/watch-signing-profile.mobileprovision"
            echo "APPLE_WATCH_PROFILE_PATH=$RUNNER_TEMP/watch-signing-profile.mobileprovision" >> "$GITHUB_ENV"
            watch_profile_name=$(extract_profile_name "$RUNNER_TEMP/watch-signing-profile.mobileprovision")
            if [[ -n "$watch_profile_name" ]]; then
              echo "APPLE_WATCH_PROFILE_NAME=$watch_profile_name" >> "$GITHUB_ENV"
              echo "Watch profile name: $watch_profile_name"
            fi
          fi

          printf '%s' "$APPLE_WATCH_WIDGET_PROVISIONING_PROFILE_BASE64" | base64 -D > "$RUNNER_TEMP/watch-widget-signing-profile.mobileprovision"
          echo "APPLE_WATCH_WIDGET_PROFILE_PATH=$RUNNER_TEMP/watch-widget-signing-profile.mobileprovision" >> "$GITHUB_ENV"
          watch_widget_profile_name=$(extract_profile_name "$RUNNER_TEMP/watch-widget-signing-profile.mobileprovision")
          if [[ -n "$watch_widget_profile_name" ]]; then
            echo "APPLE_WATCH_WIDGET_PROFILE_NAME=$watch_widget_profile_name" >> "$GITHUB_ENV"
            echo "Watch widget profile name: $watch_widget_profile_name"
          else
            echo "::error::Could not extract watch widget profile name"
            exit 1
          fi

      - name: Set up Ruby and Bundler
        uses: ruby/setup-ruby@v1.299.0
        with:
          ruby-version: '3.3'
          bundler-cache: true
        env:
          BUNDLE_FROZEN: "false"

      - name: Build, sign and upload to App Store
        run: bundle exec fastlane ios release_to_app_store

      - name: Upload signed iOS IPA artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ios-app-store-ipa
          if-no-files-found: error
          path: fastlane/output/BiciRadar.ipa
