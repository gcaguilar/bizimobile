name: Publish Android to Play Closed Testing

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-play-closed-testing:
    name: Publish Android AAB to Play Closed Testing
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select release tag
        env:
          REQUESTED_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && -n "${GITHUB_REF_NAME:-}" ]]; then
            release_tag="${GITHUB_REF_NAME}"
          elif [[ -n "${REQUESTED_RELEASE_TAG:-}" ]]; then
            release_tag="${REQUESTED_RELEASE_TAG}"
          else
            mapfile -t release_tags < <(git tag --list 'v*.*.*' --sort=-v:refname)
            release_tag="${release_tags[0]:-}"
          fi

          if [[ -n "$release_tag" && -d ".git" ]]; then
            if git rev-parse -q --verify "refs/tags/$release_tag" >/dev/null 2>&1; then
              git checkout --detach "$release_tag"
              echo "Publishing Android release from tag $release_tag"
            else
              echo "Tag $release_tag not found, using current commit"
              release_tag=""
            fi
          else
            echo "Publishing Android release from current commit (no tag)"
            release_tag=""
          fi

          echo "RELEASE_TAG=${release_tag:-$(git rev-parse --short HEAD)}" >> "$GITHUB_ENV"

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          create_credentials_file: true

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Write Android secrets
        env:
          BIZI_CI_KEYSTORE_BASE64: ${{ secrets.BIZI_CI_KEYSTORE_BASE64 }}
          GOOGLE_SERVICES_JSON_ANDROID: ${{ secrets.GOOGLE_SERVICES_JSON_ANDROID }}
        run: |
          if [[ -z "$BIZI_CI_KEYSTORE_BASE64" ]]; then
            echo "::error::BIZI_CI_KEYSTORE_BASE64 secret is required"
            exit 1
          fi
          printf '%s' "$BIZI_CI_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/bizi-ci.keystore"
          if [[ -n "$GOOGLE_SERVICES_JSON_ANDROID" ]]; then
            printf '%s' "$GOOGLE_SERVICES_JSON_ANDROID" > androidApp/google-services.json
          fi

      - name: Build Android release bundle
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY_ANDROID }}
          BIZI_CI_KEYSTORE_PATH: ${{ runner.temp }}/bizi-ci.keystore
          BIZI_CI_KEYSTORE_PASSWORD: ${{ secrets.BIZI_CI_KEYSTORE_PASSWORD }}
          BIZI_CI_KEY_ALIAS: ${{ secrets.BIZI_CI_KEY_ALIAS }}
          BIZI_CI_KEY_PASSWORD: ${{ secrets.BIZI_CI_KEY_PASSWORD }}
        run: |
          ./gradlew :androidApp:bundleRelease

      - name: Upload Android mapping to Firebase Crashlytics
        if: hashFiles('androidApp/google-services.json') != ''
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY_ANDROID }}
          BIZI_CI_KEYSTORE_PATH: ${{ runner.temp }}/bizi-ci.keystore
          BIZI_CI_KEYSTORE_PASSWORD: ${{ secrets.BIZI_CI_KEYSTORE_PASSWORD }}
          BIZI_CI_KEY_ALIAS: ${{ secrets.BIZI_CI_KEY_ALIAS }}
          BIZI_CI_KEY_PASSWORD: ${{ secrets.BIZI_CI_KEY_PASSWORD }}
        run: |
          ./gradlew :androidApp:uploadCrashlyticsMappingFileRelease

      - name: Upload Android release bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-release-bundle
          if-no-files-found: error
          path: |
            androidApp/build/outputs/bundle/release/*.aab
            androidApp/build/outputs/mapping/release/mapping.txt
            androidApp/build/outputs/native-debug-symbols/release/native-debug-symbols.zip

      - name: Publish to Play Console closed testing
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
          packageName: com.gcaguilar.biciradar
          releaseFiles: androidApp/build/outputs/bundle/release/*.aab
          mappingFile: androidApp/build/outputs/mapping/release/mapping.txt
          debugSymbols: androidApp/build/outputs/native-debug-symbols/release/native-debug-symbols.zip
          track: alpha
          status: completed
          releaseName: ${{ env.RELEASE_TAG }}
