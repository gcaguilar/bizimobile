name: Publish Android to Play Closed Testing

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-play-closed-testing:
    name: Publish Android AAB to Play Closed Testing
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-tags: true

      - name: Resolve release version
        run: |
          release_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "RELEASE_TAG=${release_tag:-$(git rev-parse --short HEAD)}" >> "$GITHUB_ENV"
          echo "Building Android release: ${release_tag:-$(git rev-parse --short HEAD)}"

      - name: Set up Java 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4.0.0

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.0.1
        with:
          build-scan-terms-of-use-url: https://gradle.com/help/legal-terms-of-use
          build-scan-terms-of-use-agree: "yes"

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          create_credentials_file: true

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Write Android secrets
        env:
          BIZI_CI_KEYSTORE_BASE64: ${{ secrets.BIZI_CI_KEYSTORE_BASE64 }}
          GOOGLE_SERVICES_JSON_ANDROID: ${{ secrets.GOOGLE_SERVICES_JSON_ANDROID }}
          GOOGLE_SERVICES_JSON_WEAR: ${{ secrets.GOOGLE_SERVICES_JSON_WEAR }}
        run: |
          if [[ -z "$BIZI_CI_KEYSTORE_BASE64" ]]; then
            echo "::error::BIZI_CI_KEYSTORE_BASE64 secret is required"
            exit 1
          fi
          printf '%s' "$BIZI_CI_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/bizi-ci.keystore"
          if [[ -n "$GOOGLE_SERVICES_JSON_ANDROID" ]]; then
            printf '%s' "$GOOGLE_SERVICES_JSON_ANDROID" > androidApp/google-services.json
          fi
          if [[ -n "$GOOGLE_SERVICES_JSON_WEAR" ]]; then
            printf '%s' "$GOOGLE_SERVICES_JSON_WEAR" > wearApp/google-services.json
          fi

      - name: Build Android release bundle
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY_ANDROID }}
        run: |
          echo "Keystore path: ${{ runner.temp }}/bizi-ci.keystore"
          echo "Keystore exists: $(test -f '${{ runner.temp }}/bizi-ci.keystore' && echo 'yes' || echo 'no')"
          ./gradlew :androidApp:bundleRelease :androidApp:uploadCrashlyticsMappingFileRelease :wearApp:bundleRelease :wearApp:uploadCrashlyticsMappingFileRelease --no-build-cache \
            -PBIZI_CI_KEYSTORE_PATH="${{ runner.temp }}/bizi-ci.keystore" \
            -PBIZI_CI_KEYSTORE_PASSWORD="${{ secrets.BIZI_CI_KEYSTORE_PASSWORD }}" \
            -PBIZI_CI_KEY_ALIAS="${{ secrets.BIZI_CI_KEY_ALIAS }}" \
            -PBIZI_CI_KEY_PASSWORD="${{ secrets.BIZI_CI_KEY_PASSWORD }}"

      - name: Upload Android release bundle artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: android-release-bundle
          if-no-files-found: error
          path: |
            androidApp/build/outputs/bundle/release/*.aab
            androidApp/build/outputs/mapping/release/mapping.txt
            wearApp/build/outputs/bundle/release/*.aab
            wearApp/build/outputs/mapping/release/mapping.txt

      - name: Publish to Play Console closed testing
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
          packageName: com.gcaguilar.biciradar
          releaseFiles: androidApp/build/outputs/bundle/release/*.aab
          mappingFile: androidApp/build/outputs/mapping/release/mapping.txt
          track: alpha
          status: completed
          releaseName: ${{ env.RELEASE_TAG }}

      - name: Publish WearOS to Play Console closed testing
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
          packageName: com.gcaguilar.biciradar
          releaseFiles: wearApp/build/outputs/bundle/release/*.aab
          mappingFile: wearApp/build/outputs/mapping/release/mapping.txt
          track: wear:alpha
          status: completed
          releaseName: ${{ env.RELEASE_TAG }}
