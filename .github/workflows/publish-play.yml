name: Publish Android to Play Internal

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-play-internal:
    name: Publish Android AAB to Play internal
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          create_credentials_file: true

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Write Android secrets
        env:
          BIZI_CI_KEYSTORE_BASE64: ${{ secrets.BIZI_CI_KEYSTORE_BASE64 }}
          GOOGLE_SERVICES_JSON_ANDROID: ${{ secrets.GOOGLE_SERVICES_JSON_ANDROID }}
        run: |
          if [[ -z "$BIZI_CI_KEYSTORE_BASE64" ]]; then
            echo "::error::BIZI_CI_KEYSTORE_BASE64 secret is required"
            exit 1
          fi
          printf '%s' "$BIZI_CI_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/bizi-ci.keystore"
          if [[ -n "$GOOGLE_SERVICES_JSON_ANDROID" ]]; then
            printf '%s' "$GOOGLE_SERVICES_JSON_ANDROID" > androidApp/google-services.json
          fi

      - name: Build Android release bundle
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY_ANDROID }}
          BIZI_CI_KEYSTORE_PATH: ${{ runner.temp }}/bizi-ci.keystore
          BIZI_CI_KEYSTORE_PASSWORD: ${{ secrets.BIZI_CI_KEYSTORE_PASSWORD }}
          BIZI_CI_KEY_ALIAS: ${{ secrets.BIZI_CI_KEY_ALIAS }}
          BIZI_CI_KEY_PASSWORD: ${{ secrets.BIZI_CI_KEY_PASSWORD }}
        run: |
          ./gradlew :androidApp:bundleRelease

      - name: Upload Android release bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-release-bundle
          if-no-files-found: error
          path: |
            androidApp/build/outputs/bundle/release/*.aab
            androidApp/build/outputs/mapping/release/mapping.txt

      - name: Publish to Play Console internal
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
          packageName: com.gcaguilar.biciradar
          releaseFiles: androidApp/build/outputs/bundle/release/*.aab
          mappingFile: androidApp/build/outputs/mapping/release/mapping.txt
          track: internal
          status: completed
          releaseName: ${{ github.ref_name }}
