name: Build and Test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FIREBASE_APP_DIST_GROUPS: ${{ vars.FIREBASE_APP_DIST_GROUPS }}
  FIREBASE_APP_DIST_TESTERS: ${{ vars.FIREBASE_APP_DIST_TESTERS }}

jobs:
  android:
    name: Android build and tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew scripts/*.sh

      - name: Write Android Firebase config files
        env:
          GOOGLE_SERVICES_JSON_ANDROID: ${{ secrets.GOOGLE_SERVICES_JSON_ANDROID }}
          GOOGLE_SERVICES_JSON_WEAR: ${{ secrets.GOOGLE_SERVICES_JSON_WEAR }}
          BIZI_CI_KEYSTORE_BASE64: ${{ secrets.BIZI_CI_KEYSTORE_BASE64 }}
        run: |
          if [[ -n "$GOOGLE_SERVICES_JSON_ANDROID" ]]; then
            printf '%s' "$GOOGLE_SERVICES_JSON_ANDROID" > androidApp/google-services.json
          fi
          if [[ -n "$GOOGLE_SERVICES_JSON_WEAR" ]]; then
            printf '%s' "$GOOGLE_SERVICES_JSON_WEAR" > wearApp/google-services.json
          fi
          if [[ -n "$BIZI_CI_KEYSTORE_BASE64" ]]; then
            printf '%s' "$BIZI_CI_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/bizi-ci.keystore"

          fi

      - name: Run Android build and tests
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY_ANDROID }}
          BIZI_CI_KEYSTORE_PATH: ${{ runner.temp }}/bizi-ci.keystore
          BIZI_CI_KEYSTORE_PASSWORD: bizi-ci-store
          BIZI_CI_KEY_ALIAS: bizi-ci
          BIZI_CI_KEY_PASSWORD: bizi-ci-store
        run: |
          if [[ -z "$GOOGLE_MAPS_API_KEY" ]]; then
            echo "::warning::GOOGLE_MAPS_API_KEY_ANDROID secret is empty — Google Maps will not work in this build"
          else
            echo "GOOGLE_MAPS_API_KEY is set (${#GOOGLE_MAPS_API_KEY} chars)"
          fi
          ./gradlew :shared:core:jvmTest :androidApp:testDebugUnitTest :androidApp:assembleDebug :wearApp:assembleDebug

      - name: Upload Android debug APKs
        uses: actions/upload-artifact@v7
        with:
          name: android-debug-apks
          if-no-files-found: error
          path: |
            androidApp/build/outputs/apk/debug/*.apk
            wearApp/build/outputs/apk/debug/*.apk

      - name: Upload Android test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-test-reports
          if-no-files-found: ignore
          path: |
            androidApp/build/reports/tests/**
            androidApp/build/test-results/**
            shared/core/build/reports/tests/**
            shared/core/build/test-results/**

      - name: Resolve Firebase distribution flags
        if: github.event_name != 'pull_request'
        env:
          _SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          _AID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          _WID: ${{ secrets.FIREBASE_WEAR_ANDROID_APP_ID }}
        run: |
          echo "DIST_ANDROID=$([[ -n "$_SA" && -n "$_AID" ]] && echo true || echo false)" >> "$GITHUB_ENV"
          echo "DIST_WEAR=$([[ -n "$_SA" && -n "$_WID" ]] && echo true || echo false)" >> "$GITHUB_ENV"
          echo "DIST_ANDROID_OR_WEAR=$([[ -n "$_SA" && ( -n "$_AID" || -n "$_WID" ) ]] && echo true || echo false)" >> "$GITHUB_ENV"

      - name: Generate Android release notes
        if: github.event_name != 'pull_request' && env.DIST_ANDROID_OR_WEAR == 'true'
        run: |
          ./scripts/write_release_notes.sh "$RUNNER_TEMP/android-release-notes.txt" "Android internal build"
          ./scripts/write_release_notes.sh "$RUNNER_TEMP/wear-release-notes.txt" "Wear OS internal build"

      - name: Distribute Android phone APK to Firebase
        if: github.event_name != 'pull_request' && env.DIST_ANDROID == 'true'
        uses: wzieba/Firebase-Distribution-Github-Action@v1.4.0
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: ${{ vars.FIREBASE_APP_DIST_GROUPS }}
          testers: ${{ vars.FIREBASE_APP_DIST_TESTERS }}
          releaseNotesFile: ${{ runner.temp }}/android-release-notes.txt
          file: androidApp/build/outputs/apk/debug/androidApp-debug.apk

      - name: Distribute Wear OS APK to Firebase
        if: github.event_name != 'pull_request' && env.DIST_WEAR == 'true'
        uses: wzieba/Firebase-Distribution-Github-Action@v1.4.0
        with:
          appId: ${{ secrets.FIREBASE_WEAR_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: ${{ vars.FIREBASE_APP_DIST_GROUPS }}
          testers: ${{ vars.FIREBASE_APP_DIST_TESTERS }}
          releaseNotesFile: ${{ runner.temp }}/wear-release-notes.txt
          file: wearApp/build/outputs/apk/debug/wearApp-debug.apk

  ios:
    name: iOS build and tests
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make scripts executable
        run: chmod +x gradlew scripts/*.sh

      - name: Write iOS secrets
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_KEY }}
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_IOS }}
        run: |
          printf 'GOOGLE_MAPS_IOS_API_KEY = %s\n' "$GOOGLE_MAPS_API_KEY" > apple/Config/LocalSecrets.xcconfig
          if [[ -n "$GOOGLE_SERVICE_INFO_PLIST" ]]; then
            printf '%s' "$GOOGLE_SERVICE_INFO_PLIST" > apple/iosApp/GoogleService-Info.plist
          fi

      - name: Resolve iOS simulator destination
        run: |
          destination="$(./scripts/resolve_xcode_destination.sh ios)"
          echo "Using iOS destination: $destination"
          {
            echo 'IOS_DESTINATION<<EOF'
            echo "$destination"
            echo EOF
          } >> "$GITHUB_ENV"

      - name: Build KMP iOS frameworks
        run: ./gradlew :shared:mobile-ui:linkDebugFrameworkIosSimulatorArm64 :shared:core:linkDebugFrameworkIosSimulatorArm64

      - name: Run iOS tests
        run: |
          xcodebuild \
            -project apple/BiciRadar.xcodeproj \
            -scheme BiciRadar \
            -sdk iphonesimulator \
            -destination "$IOS_DESTINATION" \
            -derivedDataPath "$RUNNER_TEMP/derived-data-ios" \
            -resultBundlePath "$RUNNER_TEMP/ios-tests.xcresult" \
            test

      - name: Build iOS simulator app
        run: |
          xcodebuild \
            -project apple/BiciRadar.xcodeproj \
            -scheme BiciRadar \
            -sdk iphonesimulator \
            -destination "$IOS_DESTINATION" \
            -derivedDataPath "$RUNNER_TEMP/derived-data-ios" \
            build

      - name: Package iOS simulator app
        run: |
          mkdir -p "$RUNNER_TEMP/artifacts"
          ditto -c -k --sequesterRsrc --keepParent \
            "$RUNNER_TEMP/derived-data-ios/Build/Products/Debug-iphonesimulator/BiciRadar.app" \
            "$RUNNER_TEMP/artifacts/BiciRadar-ios-simulator-app.zip"

      - name: Upload iOS simulator app
        uses: actions/upload-artifact@v7
        with:
          name: ios-simulator-app
          if-no-files-found: error
          path: ${{ runner.temp }}/artifacts/BiciRadar-ios-simulator-app.zip

      - name: Upload iOS test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-test-results
          if-no-files-found: ignore
          path: ${{ runner.temp }}/ios-tests.xcresult

      - name: Resolve Firebase distribution flags
        if: github.event_name != 'pull_request'
        env:
          _SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          _IID: ${{ secrets.FIREBASE_IOS_APP_ID }}
          _TID: ${{ secrets.APPLE_TEAM_ID }}
          _CERT: ${{ secrets.APPLE_SIGNING_CERTIFICATE_P12_BASE64 }}
          _PASS: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
          _PROF: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "DIST_IOS=$([[ -n "$_SA" && -n "$_IID" && -n "$_TID" && -n "$_CERT" && -n "$_PASS" && -n "$_PROF" ]] && echo true || echo false)" >> "$GITHUB_ENV"

      - name: Install Apple signing assets
        if: github.event_name != 'pull_request' && env.DIST_IOS == 'true'
        env:
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          APPLE_SIGNING_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_SIGNING_CERTIFICATE_P12_BASE64 }}
          APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
        run: ./scripts/install_apple_signing_assets.sh

      - name: Build signed iOS IPA
        if: github.event_name != 'pull_request' && env.DIST_IOS == 'true'
        env:
          APPLE_BUNDLE_ID: com.gcaguilar.biciradar.ios
          APPLE_EXPORT_METHOD: ${{ vars.APPLE_EXPORT_METHOD }}
          APPLE_SIGNING_CERTIFICATE_TYPE: ${{ vars.APPLE_SIGNING_CERTIFICATE_TYPE }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ./scripts/export_ios_ipa.sh "$RUNNER_TEMP/ios-export" "$RUNNER_TEMP/BiciRadar.xcarchive"

      - name: Upload signed iOS IPA
        if: github.event_name != 'pull_request' && env.DIST_IOS == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ios-device-ipa
          if-no-files-found: error
          path: ${{ runner.temp }}/ios-export/*.ipa

      - name: Generate iOS release notes
        if: github.event_name != 'pull_request' && env.DIST_IOS == 'true'
        run: ./scripts/write_release_notes.sh "$RUNNER_TEMP/ios-release-notes.txt" "iOS internal build"

      - name: Distribute iOS IPA to Firebase
        if: github.event_name != 'pull_request' && env.DIST_IOS == 'true'
        uses: wzieba/Firebase-Distribution-Github-Action@v1.4.0
        with:
          appId: ${{ secrets.FIREBASE_IOS_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: ${{ vars.FIREBASE_APP_DIST_GROUPS }}
          testers: ${{ vars.FIREBASE_APP_DIST_TESTERS }}
          releaseNotesFile: ${{ runner.temp }}/ios-release-notes.txt
          file: ${{ runner.temp }}/ios-export/*.ipa

  watchos:
    name: watchOS build and tests
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make scripts executable
        run: chmod +x gradlew scripts/*.sh

      - name: Resolve watchOS simulator destination
        run: |
          destination="$(./scripts/resolve_xcode_destination.sh watchos)"
          echo "Using watchOS destination: $destination"
          {
            echo 'WATCHOS_DESTINATION<<EOF'
            echo "$destination"
            echo EOF
          } >> "$GITHUB_ENV"

      - name: Build KMP watchOS frameworks
        run: ./gradlew :shared:core:linkDebugFrameworkWatchosSimulatorArm64

      - name: Run watchOS tests
        run: |
          xcodebuild \
            -project apple/BiciRadar.xcodeproj \
            -scheme BiciRadarWatch \
            -sdk watchsimulator \
            -destination "$WATCHOS_DESTINATION" \
            -derivedDataPath "$RUNNER_TEMP/derived-data-watchos" \
            -resultBundlePath "$RUNNER_TEMP/watchos-tests.xcresult" \
            test

      - name: Build watchOS simulator app
        run: |
          xcodebuild \
            -project apple/BiciRadar.xcodeproj \
            -scheme BiciRadarWatch \
            -sdk watchsimulator \
            -destination "$WATCHOS_DESTINATION" \
            -derivedDataPath "$RUNNER_TEMP/derived-data-watchos" \
            build

      - name: Package watchOS simulator app
        run: |
          mkdir -p "$RUNNER_TEMP/artifacts"
          ditto -c -k --sequesterRsrc --keepParent \
            "$RUNNER_TEMP/derived-data-watchos/Build/Products/Debug-watchsimulator/BiciRadar Watch.app" \
            "$RUNNER_TEMP/artifacts/BiciRadar-watchos-simulator-app.zip"

      - name: Upload watchOS simulator app
        uses: actions/upload-artifact@v7
        with:
          name: watchos-simulator-app
          if-no-files-found: error
          path: ${{ runner.temp }}/artifacts/BiciRadar-watchos-simulator-app.zip

      - name: Upload watchOS test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: watchos-test-results
          if-no-files-found: ignore
          path: ${{ runner.temp }}/watchos-tests.xcresult
