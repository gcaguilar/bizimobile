name: Build Garmin Connect IQ Widget

on:
  push:
    branches: [main]
    paths:
      - 'garminApp/**'
  pull_request:
    branches: [main]
    paths:
      - 'garminApp/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Connect IQ app
        uses: blackshadev/garmin-connectiq-build-action@9.1.0
        with:
          projectJungle: ./garminApp/monkey.jungle
          outputPath: ./bin/BiciRadar.prg
          device: fr955
          typeCheck: '1'

      - name: List build output
        run: ls -la bin/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: biciradar-garmin-widget
          path: bin/BiciRadar.prg
          retention-days: 30
