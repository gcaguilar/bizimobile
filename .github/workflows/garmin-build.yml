name: Build Garmin Connect IQ Widget

on:
  push:
    branches: [main]
    paths:
      - 'garminApp/**'
      - '.github/workflows/garmin-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'garminApp/**'
      - '.github/workflows/garmin-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: python -m pip install pillow

      - name: Generate Garmin icons
        run: python garminApp/generate_icons.py

      - name: Create developer key file
        env:
          KEY: ${{ secrets.GARMIN_DEVELOPER_KEY }}
        run: |
          echo "$KEY" | base64 -d > garminApp/developer_key

      - name: Set up Connect IQ SDK
        uses: blackshadev/garmin-connectiq-build-action@9.1.0
        with:
          projectJungle: ./garminApp/monkey.jungle
          outputPath: ./garminApp/bin/bootstrap.prg
          developerKey: ./garminApp/developer_key
          device: fr255
          typeCheck: '1'

      - name: Export Connect IQ package
        run: |
          SDK_ROOT="$(dirname "$(dirname "$(which monkeyc)")")"
          monkeyc -e \
            -f ./garminApp/monkey.jungle \
            -o ./garminApp/bin/BiciRadar.iq \
            -y ./garminApp/developer_key \
            -w

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: biciradar-garmin-widget
          path: garminApp/bin/BiciRadar.iq
          retention-days: 30
