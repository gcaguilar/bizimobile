version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      kotlin-compose:
        patterns:
          - "org.jetbrains.kotlin*"
          - "com.google.devtools.ksp*"
          - "androidx.compose*"
          - "org.jetbrains.compose*"

  - package-ecosystem: "swift"
    directory: "/apple"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
