AutoName: Bici Radar Wear
Summary: Wear OS companion for Spanish public bike availability
Description: |
  Bici Radar Wear provides glanceable public bike station information on Wear OS devices.

  This F-Droid build is a standalone free-software package and avoids proprietary wearable sync
  and crash reporting SDKs.

  Main features:

  - favorite station status
  - nearby station tile
  - complication provider
  - direct on-watch browsing of station status

