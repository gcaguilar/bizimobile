AutoName: Bici Radar
Summary: Public bike availability across Spanish cities
Description: |
  Bici Radar shows live public bike station availability across supported Spanish cities.

  This F-Droid build removes proprietary integrations and keeps the core experience focused on:

  - city station availability
  - favorites and commute shortcuts
  - widgets and notifications
  - free-software compatible external routing

  The embedded Android map in this flavor uses OpenStreetMap tiles via osmdroid instead of Google Maps.

