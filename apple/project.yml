name: BiziZaragoza

configs:
  Debug: debug
  Release: release

options:
  autoCreateSchemes: false
  bundleIdPrefix: com.gcaguilar.bizizaragoza
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "16.0"
    watchOS: "9.0"

settings:
  base:
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    SWIFT_VERSION: "5.10"

targets:
  BiziZaragoza:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: iosApp
      - path: sharedApple
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: UIKit.framework
    preBuildScripts:
      - name: Build KMP iOS frameworks
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          cd "$SRCROOT/.."
          if [ "$CONFIGURATION" = "Release" ]; then
            KMP_CONFIGURATION="Release"
          else
            KMP_CONFIGURATION="Debug"
          fi
          if [[ "$PLATFORM_NAME" == *simulator* ]]; then
            ./gradlew :shared:mobile-ui:link${KMP_CONFIGURATION}FrameworkIosSimulatorArm64
          elif [[ "$PLATFORM_NAME" == iphoneos ]]; then
            ./gradlew :shared:mobile-ui:link${KMP_CONFIGURATION}FrameworkIosArm64
          else
            echo "Unsupported destination platform '$PLATFORM_NAME' for BiziZaragoza."
            echo "Use an iPhone device or an iOS Simulator, not 'My Mac (Designed for iPad/iPhone)'."
            exit 1
          fi
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../shared/mobile-ui/build/bin/iosSimulatorArm64/debugFramework
          - $(SRCROOT)/../shared/mobile-ui/build/bin/iosSimulatorArm64/releaseFramework
          - $(SRCROOT)/../shared/mobile-ui/build/bin/iosArm64/debugFramework
          - $(SRCROOT)/../shared/mobile-ui/build/bin/iosArm64/releaseFramework
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CADisableMinimumFrameDurationOnPhone: YES
        INFOPLIST_KEY_CFBundleDisplayName: Bizi Zaragoza
        INFOPLIST_KEY_LSApplicationQueriesSchemes:
          - comgooglemaps
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: Bizi Zaragoza necesita tu ubicación para mostrar estaciones cercanas.
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        OTHER_LDFLAGS: $(inherited) -framework BiziMobileUi
        PRODUCT_BUNDLE_IDENTIFIER: com.gcaguilar.bizizaragoza.ios
        PRODUCT_NAME: Bizi Zaragoza
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        TARGETED_DEVICE_FAMILY: "1,2"

  BiziZaragozaTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: iosAppTests
      - path: iosApp/AppleLaunchRequestStore.swift
      - path: iosApp/AppleShortcutRunner.swift
      - path: iosApp/FavoritesSyncBridge.swift
      - path: sharedApple/BiziAppleGraph.swift
    dependencies:
      - sdk: XCTest.framework
    preBuildScripts:
      - name: Build KMP iOS test frameworks
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          cd "$SRCROOT/.."
          if [ "$CONFIGURATION" = "Release" ]; then
            KMP_CONFIGURATION="Release"
          else
            KMP_CONFIGURATION="Debug"
          fi
          if [[ "$PLATFORM_NAME" == *simulator* ]]; then
            ./gradlew :shared:mobile-ui:link${KMP_CONFIGURATION}FrameworkIosSimulatorArm64
          elif [[ "$PLATFORM_NAME" == iphoneos ]]; then
            ./gradlew :shared:mobile-ui:link${KMP_CONFIGURATION}FrameworkIosArm64
          else
            echo "Unsupported destination platform '$PLATFORM_NAME' for BiziZaragozaTests."
            echo "Use an iPhone device or an iOS Simulator."
            exit 1
          fi
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../shared/mobile-ui/build/bin/iosSimulatorArm64/debugFramework
          - $(SRCROOT)/../shared/mobile-ui/build/bin/iosSimulatorArm64/releaseFramework
          - $(SRCROOT)/../shared/mobile-ui/build/bin/iosArm64/debugFramework
          - $(SRCROOT)/../shared/mobile-ui/build/bin/iosArm64/releaseFramework
        GENERATE_INFOPLIST_FILE: YES
        OTHER_LDFLAGS: $(inherited) -framework BiziMobileUi
        PRODUCT_BUNDLE_IDENTIFIER: com.gcaguilar.bizizaragoza.ios.tests
        PRODUCT_NAME: Bizi Zaragoza Tests

  BiziZaragozaUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: iosAppUITests
    dependencies:
      - target: BiziZaragoza
      - sdk: XCTest.framework
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.gcaguilar.bizizaragoza.ios.uitests
        PRODUCT_NAME: Bizi Zaragoza UI Tests
        TEST_TARGET_NAME: BiziZaragoza

  BiziZaragozaWatch:
    type: application
    platform: watchOS
    deploymentTarget: "9.0"
    sources:
      - path: watchApp
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: WatchConnectivity.framework
    preBuildScripts:
      - name: Build KMP watchOS framework
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          cd "$SRCROOT/.."
          if [ "$CONFIGURATION" = "Release" ]; then
            KMP_CONFIGURATION="Release"
          else
            KMP_CONFIGURATION="Debug"
          fi
          if [[ "$PLATFORM_NAME" == *simulator* ]]; then
            ./gradlew :shared:core:link${KMP_CONFIGURATION}FrameworkWatchosSimulatorArm64
          elif [[ "$PLATFORM_NAME" == watchos ]]; then
            ./gradlew :shared:core:link${KMP_CONFIGURATION}FrameworkWatchosArm64
          else
            echo "Unsupported destination platform '$PLATFORM_NAME' for BiziZaragozaWatch."
            echo "Use an Apple Watch device or a watchOS Simulator."
            exit 1
          fi
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        EXCLUDED_ARCHS[sdk=watchsimulator*]: x86_64
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../shared/core/build/bin/watchosSimulatorArm64/debugFramework
          - $(SRCROOT)/../shared/core/build/bin/watchosSimulatorArm64/releaseFramework
          - $(SRCROOT)/../shared/core/build/bin/watchosArm64/debugFramework
          - $(SRCROOT)/../shared/core/build/bin/watchosArm64/releaseFramework
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Bizi Zaragoza Watch
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: Bizi Zaragoza necesita tu ubicación para mostrar estaciones cercanas en el reloj.
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.gcaguilar.bizizaragoza.ios
        INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: YES
        OTHER_LDFLAGS: $(inherited) -framework BiziSharedCore
        PRODUCT_BUNDLE_IDENTIFIER: com.gcaguilar.bizizaragoza.ios.watch
        PRODUCT_NAME: Bizi Zaragoza Watch

  BiziZaragozaWatchTests:
    type: bundle.unit-test
    platform: watchOS
    deploymentTarget: "9.0"
    sources:
      - path: watchAppTests
      - path: watchApp/WatchFavoritesSyncBridge.swift
      - path: watchApp/BiziWatchGraph.swift
      - path: watchApp/WatchShortcutRunner.swift
      - path: watchApp/WatchDashboardModel.swift
    dependencies:
      - sdk: XCTest.framework
      - sdk: WatchConnectivity.framework
    preBuildScripts:
      - name: Build KMP watchOS test framework
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          cd "$SRCROOT/.."
          if [ "$CONFIGURATION" = "Release" ]; then
            KMP_CONFIGURATION="Release"
          else
            KMP_CONFIGURATION="Debug"
          fi
          if [[ "$PLATFORM_NAME" == *simulator* ]]; then
            ./gradlew :shared:core:link${KMP_CONFIGURATION}FrameworkWatchosSimulatorArm64
          elif [[ "$PLATFORM_NAME" == watchos ]]; then
            ./gradlew :shared:core:link${KMP_CONFIGURATION}FrameworkWatchosArm64
          else
            echo "Unsupported destination platform '$PLATFORM_NAME' for BiziZaragozaWatchTests."
            echo "Use an Apple Watch device or a watchOS Simulator."
            exit 1
          fi
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        EXCLUDED_ARCHS[sdk=watchsimulator*]: x86_64
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../shared/core/build/bin/watchosSimulatorArm64/debugFramework
          - $(SRCROOT)/../shared/core/build/bin/watchosSimulatorArm64/releaseFramework
          - $(SRCROOT)/../shared/core/build/bin/watchosArm64/debugFramework
          - $(SRCROOT)/../shared/core/build/bin/watchosArm64/releaseFramework
        GENERATE_INFOPLIST_FILE: YES
        OTHER_LDFLAGS: $(inherited) -framework BiziSharedCore
        PRODUCT_BUNDLE_IDENTIFIER: com.gcaguilar.bizizaragoza.ios.watch.tests
        PRODUCT_NAME: Bizi Zaragoza Watch Tests

schemes:
  BiziZaragoza:
    build:
      targets:
        BiziZaragoza: all
        BiziZaragozaTests: [testing]
        BiziZaragozaUITests: [testing]
    test:
      config: Debug
      targets:
        - BiziZaragozaTests
        - BiziZaragozaUITests
    run:
      config: Debug
  BiziZaragozaWatch:
    build:
      targets:
        BiziZaragozaWatch: all
        BiziZaragozaWatchTests: [testing]
    test:
      config: Debug
      targets:
        - BiziZaragozaWatchTests
    run:
      config: Debug
