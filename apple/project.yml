name: BiciRadar

configs:
  Debug: debug
  Release: release

options:
  autoCreateSchemes: false
  bundleIdPrefix: com.gcaguilar.biciradar
  createIntermediateGroups: true
  developmentLanguage: en
  knownRegions:
    - Base
    - en
    - ca
    - eu
    - gl
  deploymentTarget:
    iOS: "16.0"
    watchOS: "9.0"

settings:
  base:
    CURRENT_PROJECT_VERSION: 29568074
    MARKETING_VERSION: 2026.03.21.0914
    SWIFT_VERSION: "5.10"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    exactVersion: 12.11.0
  GoogleMaps:
    url: https://github.com/googlemaps/ios-maps-sdk
    exactVersion: 10.10.0

targets:
  BiciRadar:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    configFiles:
      Debug: Config/MapsConfig.xcconfig
      Release: Config/MapsConfig.xcconfig
    sources:
      - path: iosApp
      - path: sharedApple
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: UIKit.framework
      - sdk: BackgroundTasks.framework
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseCrashlytics
      - package: GoogleMaps
        product: GoogleMaps
    preBuildScripts:
      - name: Build KMP iOS frameworks
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          cd "$SRCROOT/.."
          if [ "$CONFIGURATION" = "Release" ]; then
            KMP_CONFIGURATION="Release"
          else
            KMP_CONFIGURATION="Debug"
          fi
          if [[ "$PLATFORM_NAME" == *simulator* ]]; then
            ./gradlew :shared:mobile-ui:link${KMP_CONFIGURATION}FrameworkIosSimulatorArm64
          elif [[ "$PLATFORM_NAME" == iphoneos ]]; then
            ./gradlew :shared:mobile-ui:link${KMP_CONFIGURATION}FrameworkIosArm64
          else
            echo "Unsupported destination platform '$PLATFORM_NAME' for BiciRadar."
            echo "Use an iPhone device or an iOS Simulator, not 'My Mac (Designed for iPad/iPhone)'."
            exit 1
          fi
    postBuildScripts:
      - name: Upload Crashlytics dSYMs
        basedOnDependencyAnalysis: false
        inputFiles:
          - ${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}
          - ${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Resources/DWARF/${PRODUCT_NAME}
          - ${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Info.plist
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/GoogleService-Info.plist
          - $(TARGET_BUILD_DIR)/$(EXECUTABLE_PATH)
          - ${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Resources/DWARF/${PRODUCT_NAME}.debug.dylib
        script: |
          set -euo pipefail
          if [[ "$PLATFORM_NAME" == *simulator* ]]; then
            echo "Skipping Crashlytics dSYM upload for simulator builds."
            exit 0
          fi
          plist_path="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/GoogleService-Info.plist"
          if [ ! -f "$plist_path" ]; then
            echo "Skipping Crashlytics dSYM upload because GoogleService-Info.plist is not bundled."
            exit 0
          fi
          run_script="${BUILD_DIR%/Build/*}/SourcePackages/checkouts/firebase-ios-sdk/Crashlytics/run"
          if [ ! -x "$run_script" ]; then
            echo "Crashlytics run script not found at $run_script"
            exit 1
          fi
          "$run_script"
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../shared/mobile-ui/build/bin/iosSimulatorArm64/debugFramework
          - $(SRCROOT)/../shared/mobile-ui/build/bin/iosSimulatorArm64/releaseFramework
          - $(SRCROOT)/../shared/mobile-ui/build/bin/iosArm64/debugFramework
          - $(SRCROOT)/../shared/mobile-ui/build/bin/iosArm64/releaseFramework
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CADisableMinimumFrameDurationOnPhone: YES
        INFOPLIST_KEY_BiziGoogleMapsApiKey: $(GOOGLE_MAPS_IOS_API_KEY)
        INFOPLIST_KEY_CFBundleDisplayName: Bici Radar
        INFOPLIST_KEY_LSApplicationQueriesSchemes:
          - comgooglemaps
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: Bici Radar necesita tu ubicación para mostrar estaciones cercanas.
        INFOPLIST_KEY_UIBackgroundModes:
          - fetch
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_BGTaskSchedulerPermittedIdentifiers:
          - com.gcaguilar.biciradar.ios.refresh
        OTHER_LDFLAGS: $(inherited) -ObjC -framework BiziMobileUi
        PRODUCT_BUNDLE_IDENTIFIER: com.gcaguilar.biciradar.ios
        PRODUCT_NAME: BiciRadar
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        TARGETED_DEVICE_FAMILY: "1,2"

  BiciRadarTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: iosAppTests
      - path: iosApp/AppleLaunchRequestStore.swift
      - path: iosApp/AppleShortcutRunner.swift
      - path: iosApp/FavoritesSyncBridge.swift
      - path: sharedApple/BiziAppleGraph.swift
    dependencies:
      - sdk: XCTest.framework
    preBuildScripts:
      - name: Build KMP iOS test frameworks
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          cd "$SRCROOT/.."
          if [ "$CONFIGURATION" = "Release" ]; then
            KMP_CONFIGURATION="Release"
          else
            KMP_CONFIGURATION="Debug"
          fi
          if [[ "$PLATFORM_NAME" == *simulator* ]]; then
            ./gradlew :shared:mobile-ui:link${KMP_CONFIGURATION}FrameworkIosSimulatorArm64
          elif [[ "$PLATFORM_NAME" == iphoneos ]]; then
            ./gradlew :shared:mobile-ui:link${KMP_CONFIGURATION}FrameworkIosArm64
          else
            echo "Unsupported destination platform '$PLATFORM_NAME' for BiciRadarTests."
            echo "Use an iPhone device or an iOS Simulator."
            exit 1
          fi
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../shared/mobile-ui/build/bin/iosSimulatorArm64/debugFramework
          - $(SRCROOT)/../shared/mobile-ui/build/bin/iosSimulatorArm64/releaseFramework
          - $(SRCROOT)/../shared/mobile-ui/build/bin/iosArm64/debugFramework
          - $(SRCROOT)/../shared/mobile-ui/build/bin/iosArm64/releaseFramework
        GENERATE_INFOPLIST_FILE: YES
        OTHER_LDFLAGS: $(inherited) -framework BiziMobileUi
        PRODUCT_BUNDLE_IDENTIFIER: com.gcaguilar.biciradar.ios.tests
        PRODUCT_NAME: BiciRadar Tests

  BiciRadarUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: iosAppUITests
    dependencies:
      - target: BiciRadar
      - sdk: XCTest.framework
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.gcaguilar.biciradar.ios.uitests
        PRODUCT_NAME: BiciRadar UI Tests
        TEST_TARGET_NAME: BiciRadar

  BiciRadarWatch:
    type: application
    platform: watchOS
    deploymentTarget: "9.0"
    sources:
      - path: watchApp
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: WatchConnectivity.framework
    preBuildScripts:
      - name: Build KMP watchOS framework
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          cd "$SRCROOT/.."
          if [ "$CONFIGURATION" = "Release" ]; then
            KMP_CONFIGURATION="Release"
          else
            KMP_CONFIGURATION="Debug"
          fi
          if [[ "$PLATFORM_NAME" == *simulator* ]]; then
            ./gradlew :shared:core:link${KMP_CONFIGURATION}FrameworkWatchosSimulatorArm64
          elif [[ "$PLATFORM_NAME" == watchos ]]; then
            ./gradlew :shared:core:link${KMP_CONFIGURATION}FrameworkWatchosArm64
          else
            echo "Unsupported destination platform '$PLATFORM_NAME' for BiciRadarWatch."
            echo "Use an Apple Watch device or a watchOS Simulator."
            exit 1
          fi
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        EXCLUDED_ARCHS[sdk=watchsimulator*]: x86_64
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../shared/core/build/bin/watchosSimulatorArm64/debugFramework
          - $(SRCROOT)/../shared/core/build/bin/watchosSimulatorArm64/releaseFramework
          - $(SRCROOT)/../shared/core/build/bin/watchosArm64/debugFramework
          - $(SRCROOT)/../shared/core/build/bin/watchosArm64/releaseFramework
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Bici Radar Watch
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: Bici Radar necesita tu ubicación para mostrar estaciones cercanas en el reloj.
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.gcaguilar.biciradar.ios
        INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: YES
        OTHER_LDFLAGS: $(inherited) -framework BiziSharedCore
        PRODUCT_BUNDLE_IDENTIFIER: com.gcaguilar.biciradar.ios.watch
        PRODUCT_NAME: BiciRadar Watch

  BiciRadarWatchTests:
    type: bundle.unit-test
    platform: watchOS
    deploymentTarget: "9.0"
    sources:
      - path: watchAppTests
      - path: watchApp/WatchFavoritesSyncBridge.swift
      - path: watchApp/BiziWatchGraph.swift
      - path: watchApp/WatchShortcutRunner.swift
      - path: watchApp/WatchDashboardModel.swift
    dependencies:
      - sdk: XCTest.framework
      - sdk: WatchConnectivity.framework
    preBuildScripts:
      - name: Build KMP watchOS test framework
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          cd "$SRCROOT/.."
          if [ "$CONFIGURATION" = "Release" ]; then
            KMP_CONFIGURATION="Release"
          else
            KMP_CONFIGURATION="Debug"
          fi
          if [[ "$PLATFORM_NAME" == *simulator* ]]; then
            ./gradlew :shared:core:link${KMP_CONFIGURATION}FrameworkWatchosSimulatorArm64
          elif [[ "$PLATFORM_NAME" == watchos ]]; then
            ./gradlew :shared:core:link${KMP_CONFIGURATION}FrameworkWatchosArm64
          else
            echo "Unsupported destination platform '$PLATFORM_NAME' for BiciRadarWatchTests."
            echo "Use an Apple Watch device or a watchOS Simulator."
            exit 1
          fi
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        EXCLUDED_ARCHS[sdk=watchsimulator*]: x86_64
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../shared/core/build/bin/watchosSimulatorArm64/debugFramework
          - $(SRCROOT)/../shared/core/build/bin/watchosSimulatorArm64/releaseFramework
          - $(SRCROOT)/../shared/core/build/bin/watchosArm64/debugFramework
          - $(SRCROOT)/../shared/core/build/bin/watchosArm64/releaseFramework
        GENERATE_INFOPLIST_FILE: YES
        OTHER_LDFLAGS: $(inherited) -framework BiziSharedCore
        PRODUCT_BUNDLE_IDENTIFIER: com.gcaguilar.biciradar.ios.watch.tests
        PRODUCT_NAME: BiciRadar Watch Tests

schemes:
  BiciRadar:
    build:
      targets:
        BiciRadar: all
        BiciRadarTests: [testing]
        BiciRadarUITests: [testing]
    test:
      config: Debug
      targets:
        - BiciRadarTests
        - BiciRadarUITests
    run:
      config: Debug
  BiciRadarWatch:
    build:
      targets:
        BiciRadarWatch: all
        BiciRadarWatchTests: [testing]
    test:
      config: Debug
      targets:
        - BiciRadarWatchTests
    run:
      config: Debug
