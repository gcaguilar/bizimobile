name: BiciRadar

configs:
  Debug: debug
  Release: release

options:
  autoCreateSchemes: false
  bundleIdPrefix: com.gcaguilar.biciradar
  createIntermediateGroups: true
  developmentLanguage: es
  knownRegions:
    - Base
    - es
    - en
    - ca
    - eu
    - gl
  deploymentTarget:
    iOS: "16.0"
    watchOS: "9.0"

settings:
  base:
    CURRENT_PROJECT_VERSION: 29568093
    MARKETING_VERSION: 0.21.0
    SWIFT_VERSION: "5.10"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    exactVersion: 12.11.0
  GoogleMaps:
    url: https://github.com/googlemaps/ios-maps-sdk
    exactVersion: 10.10.0

targets:
  BiciRadar:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    configFiles:
      Debug: Config/MapsConfig.xcconfig
      Release: Config/MapsConfig.xcconfig
    sources:
      - path: iosApp
      - path: sharedApple
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: UIKit.framework
      - sdk: ActivityKit.framework
      - sdk: BackgroundTasks.framework
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseCrashlytics
      - package: GoogleMaps
        product: GoogleMaps
      - target: BiciRadarWidgets
        embed: true
      - target: BiciRadarWatch
        embed: true
    preBuildScripts:
      - name: Build KMP iOS frameworks
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          cd "$SRCROOT/.."
          mkdir -p \
            "shared/mobile-ui/build/bin/iosSimulatorArm64/debugFramework" \
            "shared/mobile-ui/build/bin/iosSimulatorArm64/releaseFramework" \
            "shared/mobile-ui/build/bin/iosArm64/debugFramework" \
            "shared/mobile-ui/build/bin/iosArm64/releaseFramework"
          if [ "$CONFIGURATION" = "Release" ]; then
            KMP_CONFIGURATION="Release"
          else
            KMP_CONFIGURATION="Debug"
          fi
          if [[ "$PLATFORM_NAME" == *simulator* ]]; then
            ./gradlew --no-configuration-cache :shared:mobile-ui:link${KMP_CONFIGURATION}FrameworkIosSimulatorArm64
          elif [[ "$PLATFORM_NAME" == iphoneos ]]; then
            ./gradlew --no-configuration-cache :shared:mobile-ui:link${KMP_CONFIGURATION}FrameworkIosArm64
          else
            echo "Unsupported destination platform '$PLATFORM_NAME' for BiciRadar."
            echo "Use an iPhone device or an iOS Simulator, not 'My Mac (Designed for iPad/iPhone)'."
            exit 1
          fi
    postBuildScripts:
      - name: Copy Compose Resources to app bundle
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          cd "$SRCROOT/.."
          ./gradlew --no-configuration-cache :shared:mobile-ui:syncComposeResourcesForIos \
            -Pcompose.ios.resources.platform="$PLATFORM_NAME" \
            -Pcompose.ios.resources.configuration="$CONFIGURATION" \
            -Pcompose.ios.resources.archs="$ARCHS" \
            -Pkotlin.native.cocoapods.platform="$PLATFORM_NAME" \
            -Pkotlin.native.cocoapods.archs="$ARCHS" \
            -Pkotlin.native.cocoapods.configuration="$CONFIGURATION"
      - name: Upload Crashlytics dSYMs
        basedOnDependencyAnalysis: false
        inputFiles:
          - ${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}
          - ${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Resources/DWARF/${PRODUCT_NAME}
          - ${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Info.plist
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/GoogleService-Info.plist
          - $(TARGET_BUILD_DIR)/$(EXECUTABLE_PATH)
          - ${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Resources/DWARF/${PRODUCT_NAME}.debug.dylib
        script: |
          set -euo pipefail
          if [[ "$PLATFORM_NAME" == *simulator* ]]; then
            echo "Skipping Crashlytics dSYM upload for simulator builds."
            exit 0
          fi
          plist_path="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/GoogleService-Info.plist"
          if [ ! -f "$plist_path" ]; then
            echo "Skipping Crashlytics dSYM upload because GoogleService-Info.plist is not bundled."
            exit 0
          fi
          run_script="${BUILD_DIR%/Build/*}/SourcePackages/checkouts/firebase-ios-sdk/Crashlytics/run"
          if [ ! -x "$run_script" ]; then
            echo "Crashlytics run script not found at $run_script"
            exit 1
          fi
          "$run_script"
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: iosApp/BiciRadar.entitlements
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: B87AWPVZWB
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "BiciRadarProfile"
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        FRAMEWORK_SEARCH_PATHS[config=Debug]:
          - $(inherited)
          - $(SRCROOT)/../shared/mobile-ui/build/bin/iosSimulatorArm64/debugFramework
          - $(SRCROOT)/../shared/mobile-ui/build/bin/iosArm64/debugFramework
        FRAMEWORK_SEARCH_PATHS[config=Release]:
          - $(inherited)
          - $(SRCROOT)/../shared/mobile-ui/build/bin/iosSimulatorArm64/releaseFramework
          - $(SRCROOT)/../shared/mobile-ui/build/bin/iosArm64/releaseFramework
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: iosApp/Info.plist
        OTHER_LDFLAGS: $(inherited) -ObjC -framework BiziMobileUi -lsqlite3
        PRODUCT_BUNDLE_IDENTIFIER: com.gcaguilar.biciradar.ios
        PRODUCT_NAME: BiciRadar
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        TARGETED_DEVICE_FAMILY: "1,2"

  BiciRadarWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.1"
    sources:
      - path: iosWidgets
      - path: sharedApple/BiziMonitoringActivityAttributes.swift
      - path: sharedApple/BiziSharedStorage.swift
      - path: sharedApple/BiziSurfaceStore.swift
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: iosWidgets/BiciRadarWidgets.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        DEVELOPMENT_TEAM: B87AWPVZWB
        PROVISIONING_PROFILE_SPECIFIER: "BiciRadarWidgetProfile"
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: iosWidgets/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.gcaguilar.biciradar.ios.widgets
        PRODUCT_NAME: BiciRadar Widgets

  BiciRadarTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: iosAppTests
    dependencies:
      - target: BiciRadar
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        FRAMEWORK_SEARCH_PATHS[config=Debug]:
          - $(inherited)
          - $(SRCROOT)/../shared/mobile-ui/build/bin/iosSimulatorArm64/debugFramework
          - $(SRCROOT)/../shared/mobile-ui/build/bin/iosArm64/debugFramework
        FRAMEWORK_SEARCH_PATHS[config=Release]:
          - $(inherited)
          - $(SRCROOT)/../shared/mobile-ui/build/bin/iosSimulatorArm64/releaseFramework
          - $(SRCROOT)/../shared/mobile-ui/build/bin/iosArm64/releaseFramework
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.gcaguilar.biciradar.ios.tests
        PRODUCT_NAME: BiciRadar Tests

  BiciRadarWatch:
    type: application
    platform: watchOS
    deploymentTarget: "9.0"
    sources:
      - path: watchApp
      - path: watchShared
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: WatchConnectivity.framework
      - sdk: libsqlite3.tbd
      - target: BiciRadarWatchWidgets
        embed: true
    preBuildScripts:
      - name: Build KMP watchOS framework
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          cd "$SRCROOT/.."
          mkdir -p \
            "shared/core/build/bin/watchosCurrent/debugFramework" \
            "shared/core/build/bin/watchosCurrent/releaseFramework"
          if [ "$CONFIGURATION" = "Release" ]; then
            KMP_CONFIGURATION="Release"
          else
            KMP_CONFIGURATION="Debug"
          fi
          CONF_LC=$(echo "$KMP_CONFIGURATION" | tr '[:upper:]' '[:lower:]')
          OUT_DIR="shared/core/build/bin/watchosCurrent/${CONF_LC}Framework"
          rm -rf "$OUT_DIR"
          mkdir -p "$OUT_DIR"
          if [[ "$PLATFORM_NAME" == *simulator* ]]; then
            ./gradlew --no-configuration-cache :shared:core:link${KMP_CONFIGURATION}FrameworkWatchosSimulatorArm64
            cp -R "shared/core/build/bin/watchosSimulatorArm64/${CONF_LC}Framework/BiziSharedCore.framework" "$OUT_DIR/"
          else
            ./gradlew --no-configuration-cache \
              :shared:core:link${KMP_CONFIGURATION}FrameworkWatchosArm64 \
              :shared:core:link${KMP_CONFIGURATION}FrameworkWatchosDeviceArm64
            ARM64_32_FW="shared/core/build/bin/watchosArm64/${CONF_LC}Framework/BiziSharedCore.framework"
            ARM64_FW="shared/core/build/bin/watchosDeviceArm64/${CONF_LC}Framework/BiziSharedCore.framework"
            cp -R "$ARM64_FW" "$OUT_DIR/"
            lipo -create \
              "$ARM64_32_FW/BiziSharedCore" \
              "$ARM64_FW/BiziSharedCore" \
              -output "$OUT_DIR/BiziSharedCore.framework/BiziSharedCore"
          fi
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: watchApp/BiciRadarWatch.entitlements
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: B87AWPVZWB
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "BiciRadarWatchProfile"
        ARCHS[sdk=watchos*]: "arm64 arm64_32"
        EXCLUDED_ARCHS[sdk=watchsimulator*]: x86_64
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        FRAMEWORK_SEARCH_PATHS[config=Debug]:
          - $(inherited)
          - $(SRCROOT)/../shared/core/build/bin/watchosCurrent/debugFramework
        FRAMEWORK_SEARCH_PATHS[config=Release]:
          - $(inherited)
          - $(SRCROOT)/../shared/core/build/bin/watchosCurrent/releaseFramework
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Bici Radar Watch
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: Bici Radar necesita tu ubicación para mostrar estaciones cercanas en el reloj.
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.gcaguilar.biciradar.ios
        INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: YES
        OTHER_LDFLAGS: $(inherited) -framework BiziSharedCore
        PRODUCT_BUNDLE_IDENTIFIER: com.gcaguilar.biciradar.ios.watch
        PRODUCT_NAME: BiciRadar Watch

  BiciRadarWatchWidgets:
    type: app-extension
    platform: watchOS
    deploymentTarget: "9.0"
    sources:
      - path: watchWidgets
      - path: watchShared
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: WidgetKit.framework
    settings:
      base:
        AD_HOC_CODE_SIGNING_ALLOWED[sdk=watchsimulator*]: NO
        CODE_SIGN_ENTITLEMENTS: watchWidgets/BiciRadarWatchWidgets.entitlements
        CODE_SIGNING_ALLOWED[sdk=watchsimulator*]: NO
        CODE_SIGNING_REQUIRED[sdk=watchsimulator*]: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        DEVELOPMENT_TEAM: B87AWPVZWB
        PROVISIONING_PROFILE_SPECIFIER: "BiciRadarWatchWidgetProfile"
        EXCLUDED_ARCHS[sdk=watchsimulator*]: x86_64
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: watchWidgets/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.gcaguilar.biciradar.ios.watch.widgets
        PRODUCT_NAME: BiciRadar Watch Widgets

  BiciRadarWatchTests:
    type: bundle.unit-test
    platform: watchOS
    deploymentTarget: "9.0"
    sources:
      - path: watchAppTests
      - path: watchShared
      - path: watchApp/WatchFavoritesSyncBridge.swift
      - path: watchApp/BiziWatchGraph.swift
      - path: watchApp/WatchShortcutRunner.swift
      - path: watchApp/WatchDashboardModel.swift
    dependencies:
      - target: BiciRadarWatch
      - sdk: XCTest.framework
      - sdk: WatchConnectivity.framework
      - sdk: libsqlite3.tbd
    preBuildScripts:
      - name: Build KMP watchOS test framework
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          cd "$SRCROOT/.."
          mkdir -p \
            "shared/core/build/bin/watchosCurrent/debugFramework" \
            "shared/core/build/bin/watchosCurrent/releaseFramework"
          if [ "$CONFIGURATION" = "Release" ]; then
            KMP_CONFIGURATION="Release"
          else
            KMP_CONFIGURATION="Debug"
          fi
          CONF_LC=$(echo "$KMP_CONFIGURATION" | tr '[:upper:]' '[:lower:]')
          OUT_DIR="shared/core/build/bin/watchosCurrent/${CONF_LC}Framework"
          rm -rf "$OUT_DIR"
          mkdir -p "$OUT_DIR"
          if [[ "$PLATFORM_NAME" == *simulator* ]]; then
            ./gradlew --no-configuration-cache :shared:core:link${KMP_CONFIGURATION}FrameworkWatchosSimulatorArm64
            cp -R "shared/core/build/bin/watchosSimulatorArm64/${CONF_LC}Framework/BiziSharedCore.framework" "$OUT_DIR/"
          elif [[ "$PLATFORM_NAME" == watchos ]]; then
            ./gradlew --no-configuration-cache \
              :shared:core:link${KMP_CONFIGURATION}FrameworkWatchosArm64 \
              :shared:core:link${KMP_CONFIGURATION}FrameworkWatchosDeviceArm64
            ARM64_32_FW="shared/core/build/bin/watchosArm64/${CONF_LC}Framework/BiziSharedCore.framework"
            ARM64_FW="shared/core/build/bin/watchosDeviceArm64/${CONF_LC}Framework/BiziSharedCore.framework"
            cp -R "$ARM64_FW" "$OUT_DIR/"
            lipo -create \
              "$ARM64_32_FW/BiziSharedCore" \
              "$ARM64_FW/BiziSharedCore" \
              -output "$OUT_DIR/BiziSharedCore.framework/BiziSharedCore"
          else
            echo "Unsupported destination platform '$PLATFORM_NAME' for BiciRadarWatchTests."
            echo "Use an Apple Watch device or a watchOS Simulator."
            exit 1
          fi
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        EXCLUDED_ARCHS[sdk=watchsimulator*]: x86_64
        FRAMEWORK_SEARCH_PATHS[config=Debug]:
          - $(inherited)
          - $(SRCROOT)/../shared/core/build/bin/watchosCurrent/debugFramework
        FRAMEWORK_SEARCH_PATHS[config=Release]:
          - $(inherited)
          - $(SRCROOT)/../shared/core/build/bin/watchosCurrent/releaseFramework
        GENERATE_INFOPLIST_FILE: YES
        OTHER_LDFLAGS: $(inherited) -framework BiziSharedCore
        PRODUCT_BUNDLE_IDENTIFIER: com.gcaguilar.biciradar.ios.watch.tests
        PRODUCT_NAME: BiciRadar Watch Tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/BiciRadar Watch.app/BiciRadar Watch"

schemes:
  BiciRadariOSTests:
    build:
      targets:
        BiciRadar: all
        BiciRadarWidgets: all
        BiciRadarTests: [testing]
    test:
      config: Debug
      targets:
        - BiciRadarTests
    run:
      config: Debug
  BiciRadar:
    build:
      targets:
        BiciRadar: all
        BiciRadarWidgets: all
        BiciRadarWatch: all
        BiciRadarTests: [testing]
    test:
      config: Debug
      targets:
        - BiciRadarTests
    run:
      config: Debug
  BiciRadarWatch:
    build:
      targets:
        BiciRadarWatch: all
        BiciRadarWatchWidgets: all
        BiciRadarWatchTests: [testing]
    test:
      config: Debug
      targets:
        - BiciRadarWatchTests
    run:
      config: Debug
