<!--
  Cuerpo del correo transaccional (una variante por envío).
  Diseño alineado con landing/emails/beta-email-variants-preview.html — mantener ambos coherentes.
  Placeholders: GREETING, HEADLINE, INTRO, HINT_HTML, BUTTONS_HTML, SUPPORT_LINE, CLOSING, SIGNATURE, LOCALE
-->
<div
  lang="{{LOCALE}}"
  style="max-width:560px;margin:0 auto;padding:24px 24px 28px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;box-shadow:0 1px 2px rgba(15,23,42,0.06);font-family:Arial,Helvetica,sans-serif;font-size:16px;line-height:1.6;color:#0f172a"
>
  <p style="margin:0 0 12px">{{GREETING}}</p>
  <h2 style="font-size:20px;line-height:1.3;margin:0 0 12px">{{HEADLINE}}</h2>
  <p style="margin:0 0 12px">{{INTRO}}</p>
  {{HINT_HTML}}
  <div style="margin:20px 0 16px">{{BUTTONS_HTML}}</div>
  <p style="margin:16px 0 0;font-size:14px;color:#64748b">{{SUPPORT_LINE}}</p>
  <p style="margin:8px 0 0;font-size:15px">{{CLOSING}}<br />{{SIGNATURE}}</p>
</div>
